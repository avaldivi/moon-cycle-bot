name: Trigger Daily Moon Post

on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC = 9:00 AM ET (most of the year)
  workflow_dispatch:

jobs:
  ping-daily-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call the /daily endpoint
        run: |
          curl -f -sS -X POST "${{ secrets.FLY_APP_URL }}/daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"