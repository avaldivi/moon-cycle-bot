name: Check mentions

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /mentions
        run: |
          curl -sS -X POST "${{ secrets.FLY_APP_URL }}/mentions"
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"