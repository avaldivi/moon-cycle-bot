name: Check mentions

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch:

jobs:
  ping-mentions-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Call the /mentions endpoint
        env:
          FLY_APP_URL: ${{ secrets.FLY_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -f -sS -X POST "$FLY_APP_URL/mentions" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "fly-prefer-region: iad"